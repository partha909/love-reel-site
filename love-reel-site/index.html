<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel Creator</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:380px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin-top:8px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.preview img{
width:70px;
height:70px;
margin:5px;
border-radius:8px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Love Reel ❤️</h2>

<input id="creatorName" placeholder="Your Name">

<input id="loverName" placeholder="Lover Name">

<br>

Music

<input type="file" id="musicFile" accept="audio/*">

<br>

Photos

<input type="file" id="photoFiles" multiple accept="image/*">

<div class="preview" id="preview"></div>

<br>

<button onclick="generateLink()">Generate Love Link ❤️</button>

<p id="linkBox"></p>

</div>

<script src="script.js"></script>

</body>
</html>
