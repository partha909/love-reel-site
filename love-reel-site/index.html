<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel Creator</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

#generatedLink{
margin-top:10px;
word-break:break-all;
color:#ff4d6d;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Love Reel ❤️</h2>

<input id="nameInput" placeholder="Your Name">

<input id="loverInput" placeholder="Lover Name">

<br>

<input type="file" id="music" accept="audio/*">

<br>

<input type="file" id="photos" multiple accept="image/*">

<br>

<button id="generateBtn">Generate Love Link ❤️</button>

<p id="generatedLink"></p>

</div>

<script src="script.js"></script>

</body>
</html>
