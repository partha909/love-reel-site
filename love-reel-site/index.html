<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Love Reel</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:30px;
width:350px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#ff4d6d;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff4d6d;
color:white;
padding:12px;
border:none;
border-radius:25px;
width:100%;
font-size:16px;
cursor:pointer;
}

#linkBox{
margin-top:15px;
word-break:break-all;
color:green;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Love Reel ❤️</h2>

<input id="creator" placeholder="Your Name">

<input id="lover" placeholder="Lover Name">

<label>Upload Photos (1-20)</label>
<input type="file" id="photos" multiple>

<label>Upload Music</label>
<input type="file" id="music">

<button onclick="createReel()">Generate Love Link</button>

<div id="linkBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = supabase.createClient(
"https://wakqdyivbsayqcgptvwt.supabase.co",
"sb_publishable_hmfrQQc8drLkV2hlN9c3pA_Vp9vC68h"
)

async function createReel(){

let creator=document.getElementById("creator").value
let lover=document.getElementById("lover").value

let photoFiles=document.getElementById("photos").files
let musicFile=document.getElementById("music").files[0]

if(!creator||!lover||photoFiles.length==0||!musicFile){
alert("Fill all fields")
return
}

let photoUrls=[]

for(let file of photoFiles){

let fileName=Date.now()+"_"+file.name

await supabase.storage
.from("love-reels")
.upload(fileName,file)

let {data}=supabase.storage
.from("love-reels")
.getPublicUrl(fileName)

photoUrls.push(data.publicUrl)

}

let musicName=Date.now()+"_"+musicFile.name

await supabase.storage
.from("love-reels")
.upload(musicName,musicFile)

let {data:musicData}=supabase.storage
.from("love-reels")
.getPublicUrl(musicName)

let musicUrl=musicData.publicUrl

let {data,error}=await supabase
.from("reels")
.insert({
creator_name:creator,
lover_name:lover,
music_url:musicUrl,
photos:photoUrls
})
.select()

let id=data[0].id

let link=window.location.origin+"/view.html?id="+id

document.getElementById("linkBox").innerHTML="Love Link:<br>"+link

}

</script>

</body>
</html>
