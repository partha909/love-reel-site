<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel Creator</title>

<style>

body{
font-family:Arial;
background:#ff99ac;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
width:350px;
}

input{
width:90%;
padding:10px;
margin:6px;
}

button{
padding:10px 20px;
background:#ff4d6d;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Love Link ❤️</h2>

<input id="creator" placeholder="Your Name">

<input id="lover" placeholder="Lover Name">

<br>

Music

<input type="file" id="music">

<button onclick="uploadMusic()">Upload Music</button>

<br><br>

Photos

<input type="file" id="photos" multiple>

<button onclick="uploadPhotos()">Upload Photos</button>

<br><br>

<button id="generateBtn" style="display:none" onclick="generateLink()">
Generate Love Link ❤️
</button>

<p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
