<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:360px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
color:#ff4d6d;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

.storyPage{
display:none;
text-align:center;
}

</style>

</head>

<body>

<div class="container" id="creatorPage">

<h2>Create Love Reel ❤️</h2>

<input id="nameInput" placeholder="Your Name">

<input id="loverInput" placeholder="Lover Name">

<br>

<input type="file" id="music" accept="audio/*">

<br>

<input type="file" id="photos" multiple accept="image/*">

<br>

<button id="generateBtn">
Generate Love Link ❤️
</button>

<p id="generatedLink"></p>

</div>


<div class="container storyPage" id="page1">

<h2 id="creatorText"></h2>

<button onclick="showPage(2)">Next ➡️</button>

</div>


<div class="container storyPage" id="page2">

<h2>Play Music? 🎵</h2>

<button onclick="playMusic()">YES ❤️</button>

<button onclick="alert('Try Again 😅 Please press YES!')">NO ❌</button>

</div>


<audio id="song"></audio>

<script src="script.js"></script>

</body>
</html>
