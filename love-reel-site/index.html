<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Love Link</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js" defer></script>

<style>

body{
font-family:Arial;
background:#ff99ac;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:360px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:6px;
}

button{
padding:10px 18px;
background:#ff4d6d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.progress{
height:8px;
background:#eee;
margin-top:6px;
border-radius:6px;
}

.bar{
height:8px;
width:0%;
background:#ff4d6d;
border-radius:6px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Love Link ❤️</h2>

<input id="creator" placeholder="Your Name">

<input id="lover" placeholder="Lover Name">

<br>

Music

<input type="file" id="musicFile">

<button onclick="uploadMusic()">Upload Music</button>

<div class="progress"><div id="musicBar" class="bar"></div></div>

<br>

Photos

<input type="file" id="photoFiles" multiple>

<button onclick="uploadPhotos()">Upload Photos</button>

<div class="progress"><div id="photoBar" class="bar"></div></div>

<br>

<button id="generateBtn" onclick="generateLink()" style="display:none">
Generate Love Link ❤️
</button>

<p id="link"></p>

</div>

</body>
</html>
