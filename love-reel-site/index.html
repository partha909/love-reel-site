<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Love Link</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js" defer></script>

<style>
body{
font-family:Arial;
background:#ff99ac;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
width:360px;
border-radius:10px;
text-align:center;
}

input{
width:95%;
padding:10px;
margin:6px 0;
}

button{
padding:10px 16px;
background:#ff4d6d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.progress{
height:8px;
background:#eee;
border-radius:5px;
margin-top:4px;
}

.bar{
height:8px;
width:0%;
background:#ff4d6d;
border-radius:5px;
transition:0.2s;
}
</style>
</head>

<body>

<div class="box">

<h3>Create Love Link ❤️</h3>

<input id="creator" placeholder="Your Name">
<input id="lover" placeholder="Lover Name">

<br>

Music (MP3)

<input type="file" id="musicFile">

<button id="uploadMusic">Upload Music</button>

<div class="progress"><div id="musicBar" class="bar"></div></div>

<br><br>

Photos

<input type="file" id="photoFiles" multiple>

<button id="uploadPhotos">Upload Photos</button>

<div class="progress"><div id="photoBar" class="bar"></div></div>

<br><br>

<button id="generateBtn" disabled>Generate Love Link</button>

<p id="result"></p>

</div>

</body>
</html>
