<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel Creator</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:380px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin-top:8px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.preview img{
width:70px;
height:70px;
object-fit:cover;
margin:5px;
border-radius:8px;
}

.progress{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
margin-top:8px;
}

.bar{
height:10px;
width:0%;
background:#ff4d6d;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Love Reel ❤️</h2>

<input id="creatorName" placeholder="Your Name">

<input id="loverName" placeholder="Lover Name">

<br>

Music (MP3)

<input type="file" id="musicFile" accept="audio/*">

<button id="uploadMusic">Upload Music</button>

<div class="progress">
<div class="bar" id="musicBar"></div>
</div>

<br>

Photos

<input type="file" id="photoFiles" multiple accept="image/*">

<button id="uploadPhotos">Upload Photos</button>

<div class="progress">
<div class="bar" id="photoBar"></div>
</div>

<div class="preview" id="photoPreview"></div>

<br>

<button id="generateLink" style="display:none;">
Generate Love Link ❤️
</button>

<p id="linkBox"></p>

</div>

<script src="script.js"></script>

</body>
</html>
