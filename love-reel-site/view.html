<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story</title>

<style>
body{
font-family:Arial;
background:#ff99ac;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:20px;
width:350px;
text-align:center;
border-radius:10px;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="box">

<h2 id="title"></h2>

<button onclick="playMusic()">Play Music 🎵</button>

<div id="photos"></div>

</div>

<audio id="player"></audio>

<script>

const id=new URLSearchParams(location.search).get("id")
const data=JSON.parse(localStorage.getItem(id))

document.getElementById("title").innerText=
"Website Created By "+data.creator+" ❤️"

function playMusic(){
const player=document.getElementById("player")
player.src=data.music
player.play()
showPhotos()
}

function showPhotos(){
const box=document.getElementById("photos")

data.photos.forEach(url=>{
const img=document.createElement("img")
img.src=url
box.appendChild(img)
})
}

</script>

</body>
</html>
