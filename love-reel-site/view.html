<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:white;
width:360px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.page{display:none;}

button{
padding:10px 18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:12px;
cursor:pointer;
opacity:0;
transition:0.6s;
}

button.show{
opacity:1;
}

#slide{
width:100%;
border-radius:10px;
opacity:0;
transform:scale(0.85);
transition:1.5s;
}

#slide.show{
opacity:1;
transform:scale(1);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:20px;
border-radius:10px;
width:260px;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<div class="page" id="p1">
<h2 id="t1"></h2>
<button id="b1" onclick="show(2)">Next</button>
</div>

<div class="page" id="p2">
<h3>Play Music? 🎵</h3>
<button onclick="playMusic()">Play</button>
<button onclick="angry()">Not Play</button>
</div>

<div class="page" id="p3">
<h3 id="t2"></h3>
<button id="b2" onclick="show(4)">Next</button>
</div>

<div class="page" id="p4">
<h3 id="t3"></h3>
<button onclick="excited()">I'm Excited 😊</button>
<button onclick="angry()">I Don't Want</button>
</div>

<div class="page" id="p5">
<p id="note1"></p>
<button id="b3" onclick="show(6)">Next</button>
</div>

<div class="page" id="p6">
<h3>Do you want to see what I made?</h3>
<button onclick="romantic()">Yes</button>
<button onclick="angry()">No</button>
</div>

<div class="page" id="p7">
<p id="note2"></p>
<button id="b4" onclick="show(8)">Next</button>
</div>

<div class="page" id="p8">
<h3>Turn On The Light 💡</h3>
<button onclick="startSlide()">Light On</button>
</div>

<div class="page" id="p9">
<img id="slide">
</div>

</div>

<div class="popup" id="popup">
<div class="popupBox">
<p id="popupText"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

function typeText(el,text,speed,callback){

let i=0
el.innerHTML=""

const timer=setInterval(()=>{

el.innerHTML+=text.charAt(i)
i++

if(i>=text.length){
clearInterval(timer)
if(callback)callback()
}

},speed)

}

function show(n){
document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById("p"+n).style.display="block"
}

function start(){

show(1)

typeText(
document.getElementById("t1"),
"Website Created By "+data.creator+" ❤️",
80,
()=>{
document.getElementById("b1").classList.add("show")
}
)

}

function playMusic(){

const player=document.getElementById("player")
player.src=data.music
player.play()

typeText(
document.getElementById("t2"),
"You are very special to me ❤️",
80,
()=>{
document.getElementById("b2").classList.add("show")
}
)

show(3)

}

function excited(){

typeText(
document.getElementById("note1"),
"That makes me really happy ❤️",
80,
()=>{
document.getElementById("b3").classList.add("show")
}
)

show(5)

}

function romantic(){

typeText(
document.getElementById("note2"),
"You are the most special person in my life ❤️",
80,
()=>{
document.getElementById("b4").classList.add("show")
}
)

show(7)

}

function angry(){

document.getElementById("popupText").innerText="Why not? 😠"
document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

let index=0

function startSlide(){
show(9)
slide()
}

function slide(){

const img=document.getElementById("slide")

img.src=data.photos[index]

img.classList.remove("show")

setTimeout(()=>{
img.classList.add("show")
},100)

index++

if(index>=data.photos.length)return

setTimeout(slide,3500)

}

start()

</script>
</body>
</html>
