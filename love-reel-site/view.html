<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:white;
width:420px;
max-width:95%;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.page{display:none;}

button{
padding:10px 18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

img{
width:100%;
border-radius:10px;
opacity:0;
}

.fade{animation:fade 2s forwards;}
.zoom{animation:zoom 2s forwards;}
.pulse{animation:pulse 2s forwards;}
.slide{animation:slide 2s forwards;}
.blur{animation:blur 2s forwards;}

@keyframes fade{
0%{opacity:0}
100%{opacity:1}
}

@keyframes zoom{
0%{opacity:0;transform:scale(.8)}
100%{opacity:1;transform:scale(1)}
}

@keyframes pulse{
0%{opacity:0;transform:scale(.9)}
50%{transform:scale(1.05)}
100%{opacity:1;transform:scale(1)}
}

@keyframes slide{
0%{opacity:0;transform:translateY(40px)}
100%{opacity:1;transform:translateY(0)}
}

@keyframes blur{
0%{opacity:0;filter:blur(8px)}
100%{opacity:1;filter:blur(0)}
}

/* NOTE SLIDE ANIMATION */

.noteBox{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:noteSlide .6s ease;
}

@keyframes noteSlide{

0%{
transform:translateY(-60px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}

}

</style>
</head>

<body>

<div class="box">

<div class="page" id="p1">
<h2 id="creatorText"></h2>
<button onclick="show(2)">Next</button>
</div>

<div class="page" id="p2">
<h3>Play Music?</h3>
<button onclick="playMusic()">Play</button>
<button onclick="angry()">Not Play</button>
</div>

<div class="page" id="p3">
<h3>It's Your Special Day</h3>
<p>Because you are special to me ❤️</p>
<button onclick="thankYou()">Thank You ❤️</button>
</div>

<div class="page" id="p4">
<h3>I had to make something special</h3>
<p>Because you are special to me ❤️</p>
<button onclick="excited()">I am excited 😊</button>
<button onclick="angry()">Not excited</button>
</div>

<div class="page" id="p5">
<h3>Do you want to see what I made?</h3>
<button onclick="romantic()">Yes</button>
<button onclick="angry()">No</button>
</div>

<div class="page" id="p6">
<h3>Turn On Light 💡</h3>
<button onclick="startSlide()">Light On</button>
</div>

<div class="page" id="p7">
<img id="slide">
</div>

</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

show(1)

/* SLOW TEXT ANIMATION */

function typeText(el,text){

let i=0
el.innerHTML=""

const timer=setInterval(()=>{

el.innerHTML+=text.charAt(i)
i++

if(i>=text.length) clearInterval(timer)

},150)

}

typeText(
document.getElementById("creatorText"),
"Website Created By "+data.creator+" ❤️"
)

function show(n){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById("p"+n).style.display="block"

}

/* NOTE PAGE */

function note(text,nextPage){

showNote(text)

setTimeout(()=>{
show(nextPage)
},3000)

}

function showNote(text){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

const div=document.createElement("div")

div.className="noteBox"

div.innerHTML="<h3>"+text+"</h3>"

document.body.appendChild(div)

setTimeout(()=>{
div.remove()
},3000)

}

function playMusic(){

const player=document.getElementById("player")
player.src=data.music
player.play()

note(
"Thank you for playing the music ❤️",
3
)

}

function thankYou(){

note(
"You make this moment special ❤️",
4
)

}

function excited(){

note(
"That makes me really happy ❤️",
5
)

}

function romantic(){

note(
"You are the most special person in my life ❤️",
6
)

}

function angry(){

alert("Why not? 😠")

}

/* PHOTO SLIDE */

let index=0
const effects=["fade","zoom","pulse","slide","blur"]

function startSlide(){

show(7)
slide()

}

function slide(){

const img=document.getElementById("slide")

img.className=""
img.src=data.photos[index]

const effect=effects[index % effects.length]

setTimeout(()=>{
img.classList.add(effect)
},100)

index++

if(index>=data.photos.length)return

setTimeout(slide,2000)

}

</script>

</body>
</html>
