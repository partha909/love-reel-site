<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.page{display:none}

button{
padding:12px 20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:15px;
cursor:pointer;
opacity:0;
}

.btnBounce{
animation:bounceBtn 1.2s ease forwards;
}

@keyframes bounceBtn{
0%{transform:translateY(120px) scale(.8);opacity:0;}
50%{transform:translateY(-15px) scale(1.1);}
70%{transform:translateY(10px);}
100%{transform:translateY(0);opacity:1;}
}

.cursor{
display:inline-block;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

.noteBox{
background:linear-gradient(135deg,#ffd6e7,#ffb6c9);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
}

/* IMAGE */

img{
width:80%;
border-radius:12px;
}

/* IMAGE ANIMATIONS */

.animBlur{animation:blurClear 2s ease}
@keyframes blurClear{
0%{filter:blur(25px);opacity:0;transform:scale(1.2)}
100%{filter:blur(0);opacity:1;transform:scale(1)}
}

.animZoom{animation:zoomRomantic 2s ease}
@keyframes zoomRomantic{
0%{transform:scale(.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

.animTop{animation:topRomantic 2s ease}
@keyframes topRomantic{
0%{transform:translateY(-200px);opacity:0}
100%{transform:translateY(0);opacity:1}
}

.animBottom{animation:bottomRomantic 2s ease}
@keyframes bottomRomantic{
0%{transform:translateY(200px);opacity:0}
100%{transform:translateY(0);opacity:1}
}

.animRotate{animation:rotateRomantic 2s ease}
@keyframes rotateRomantic{
0%{transform:rotate(-180deg) scale(.5);opacity:0}
100%{transform:rotate(0) scale(1);opacity:1}
}

.animLeft{animation:leftRomantic 2s ease}
@keyframes leftRomantic{
0%{transform:translateX(-250px);opacity:0}
100%{transform:translateX(0);opacity:1}
}

.animRight{animation:rightRomantic 2s ease}
@keyframes rightRomantic{
0%{transform:translateX(250px);opacity:0}
100%{transform:translateX(0);opacity:1}
}

/* CREDIT */

.creditScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
font-size:28px;
text-align:center;
opacity:0;
animation:creditFade 2s forwards;
z-index:50;
}

.creditScreen small{
font-size:18px;
margin-top:10px;
}

@keyframes creditFade{
0%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="box">

<div class="page" id="p1">
<h2 id="creatorText"></h2>
<button id="btn1" onclick="show(2)">Next</button>
</div>

<div class="page" id="p2">
<h3 id="playText"></h3>
<button id="playBtn" onclick="playMusic()">Play</button>
<button id="notBtn" onclick="angryPlay()">Not Play</button>
</div>

<div class="page" id="p3">
<h3 id="specialText"></h3>
<p id="specialSub"></p>
<button id="thankBtn" onclick="thankYou()">Thank You ❤️</button>
</div>

<div class="page" id="p4">
<h3 id="makeText"></h3>
<p id="makeSub"></p>
<button id="excitedBtn" onclick="excited()">I Am Excited</button>
<button id="noBtn" onclick="angryExcited()">Not Excited</button>
</div>

<div class="page" id="p5">
<h3 id="seeText"></h3>
<button id="yesBtn" onclick="romantic()">Yes</button>
<button id="noBtn2" onclick="angrySee()">No</button>
</div>

<div class="page" id="p6">
<h3 id="lightText"></h3>
<button id="lightBtn" onclick="startSlide()">Light On</button>
</div>

<div class="page" id="p7">
<img id="slide">
</div>

</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

show(1)

/* TEXT INITIALIZATION (RESTORED) */

typeLetter(
document.getElementById("creatorText"),
"Welcome To My Website Created By "+data.creator+" ❤️",
80,
[document.getElementById("btn1")]
)

typeLetter(
document.getElementById("playText"),
"Play Music?",
80,
[
document.getElementById("playBtn"),
document.getElementById("notBtn")
]
)

typeLetter(
document.getElementById("specialText"),
"It's Your Special Day"
)

typeLetter(
document.getElementById("specialSub"),
"Because You Are Special To Me ❤️",
80,
[document.getElementById("thankBtn")]
)

typeLetter(
document.getElementById("makeText"),
"I Had To Make Something Special"
)

typeLetter(
document.getElementById("makeSub"),
"Because You Are Special To Me ❤️",
80,
[
document.getElementById("excitedBtn"),
document.getElementById("noBtn")
]
)

typeLetter(
document.getElementById("seeText"),
"Do You Want To See What I Made?",
80,
[
document.getElementById("yesBtn"),
document.getElementById("noBtn2")
]
)

typeLetter(
document.getElementById("lightText"),
"Turn On The Light",
80,
[document.getElementById("lightBtn")]
)

/* SLIDESHOW */

let index=0

function startSlide(){
show(7)
slide()
}

function slide(){

const img=document.getElementById("slide")

const animations=[
"animBlur",
"animZoom",
"animTop",
"animBottom",
"animRotate",
"animLeft",
"animRight"
]

img.className=""

const randomAnim=animations[Math.floor(Math.random()*animations.length)]

img.classList.add(randomAnim)

img.src=data.photos[index]

index++

if(index>=data.photos.length){

setTimeout(showCredits,6000)

return
}

setTimeout(slide,2200)

}

function showCredits(){

const credit=document.createElement("div")

credit.className="creditScreen"

credit.innerHTML=`
<div>
<b>Website Owned By Partha Saha</b>
<br>
<small>Contact On Telegram @Partha909</small>
</div>
`

document.body.appendChild(credit)

}

</script>

</body>
</html>
