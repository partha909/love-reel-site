<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
background:white;
width:360px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.page{
display:none;
}

button{
padding:10px 18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:10px;
cursor:pointer;
}

img{
width:100%;
border-radius:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:20px;
border-radius:10px;
width:260px;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<!-- PAGE 1 -->
<div class="page" id="p1">

<h2 id="creatorText"></h2>

<button onclick="show(2)">Next</button>

</div>

<!-- PAGE 2 -->
<div class="page" id="p2">

<h2>Play Music 🎵</h2>

<button onclick="playMusic()">Play</button>

</div>

<!-- PAGE 3 -->
<div class="page" id="p3">

<h2>It's Your Special Day 🎉</h2>

<p>Because you are special to me ❤️</p>

<button onclick="show(4)">OK</button>

</div>

<!-- PAGE 4 -->
<div class="page" id="p4">

<h2>I Had To Make Something Special</h2>

<p>Because you are special to me ❤️</p>

<button onclick="show(5)">I Want To See</button>

<button onclick="angry()">I Don't Want To See</button>

</div>

<!-- PAGE 5 -->
<div class="page" id="p5">

<h2>Do You Want To See What I Made?</h2>

<button onclick="romantic()">YES</button>

<button onclick="angry()">NO</button>

<p id="reply"></p>

<button id="nextBtn" style="display:none" onclick="show(6)">
Next
</button>

</div>

<!-- PAGE 6 -->
<div class="page" id="p6">

<h2>Turn On The Light 💡</h2>

<button onclick="startSlide()">Light On</button>

</div>

<!-- PAGE 7 -->
<div class="page" id="p7">

<img id="slide">

</div>

<!-- PAGE 8 -->
<div class="page" id="p8">

<h3>Website Owner</h3>

<p>Partha Saha</p>

<p>Contact Telegram: @Partha909</p>

</div>

</div>

<div class="popup" id="popup">

<div class="popupBox">

<p id="popupText"></p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

document.getElementById("creatorText").innerText=
"Website Created By "+data.creator+" ❤️"

show(1)

function show(n){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

document.getElementById("p"+n).style.display="block"

}

function playMusic(){

const player=document.getElementById("player")
player.src=data.music
player.play()

document.getElementById("popupText").innerText=
"Thank you shona ❤️"

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"
show(3)

}

function romantic(){

document.getElementById("reply").innerText=
"You are the most special person in my life ❤️"

document.getElementById("nextBtn").style.display="block"

}

function angry(){

document.getElementById("popupText").innerText=
"😡 Come on! You must see this surprise!"

document.getElementById("popup").style.display="flex"

}

let index=0

function startSlide(){

show(7)

slide()

}

function slide(){

const img=document.getElementById("slide")

img.src=data.photos[index]

index++

if(index>=data.photos.length){

setTimeout(()=>{
show(8)
},2000)

return
}

setTimeout(slide,2000)

}

</script>

</body>
</html>
