<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* UI */

.box{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* PAGE */

.page{display:none}

/* BUTTON */

button{
padding:12px 20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:15px;
cursor:pointer;
opacity:0;
transform:scale(.8);
transition:.4s;
}

button.show{
opacity:1;
animation:jumpDown .6s ease;
transform:scale(1);
}

@keyframes jumpDown{

0%{
transform:translateY(-60px) scale(.8);
opacity:0;
}

70%{
transform:translateY(10px) scale(1.1);
}

100%{
transform:translateY(0);
opacity:1;
}

}

/* CURSOR */

.cursor{
display:inline-block;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

/* NOTE */

.noteBox{
background:linear-gradient(135deg,#ffd6e7,#ffb6c9);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
}

/* IMAGE */

img{
width:80%;
border-radius:12px;
}

/* HEART */

.heart{
position:fixed;
bottom:-20px;
color:#ff4d6d;
font-size:20px;
animation:heartFloat 6s linear infinite;
}

@keyframes heartFloat{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* FLOWER */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:flowerFall 7s linear infinite;
}

@keyframes flowerFall{
0%{transform:translateY(0) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

</style>
</head>

<body>

<div class="box">

<div class="page" id="p1">
<h2 id="creatorText"></h2>
<button id="btn1" onclick="show(2)">Next</button>
</div>

<div class="page" id="p2">
<h3 id="playText"></h3>
<button id="playBtn" onclick="playMusic()">Play</button>
<button id="notBtn" onclick="angry()">Not Play</button>
</div>

<div class="page" id="p3">
<h3 id="specialText"></h3>
<p id="specialSub"></p>
<button id="thankBtn" onclick="thankYou()">Thank You ❤️</button>
</div>

<div class="page" id="p4">
<h3 id="makeText"></h3>
<p id="makeSub"></p>
<button id="excitedBtn" onclick="excited()">I Am Excited</button>
<button id="noBtn" onclick="angry()">Not Excited</button>
</div>

<div class="page" id="p5">
<h3 id="seeText"></h3>
<button id="yesBtn" onclick="romantic()">Yes</button>
<button id="noBtn2" onclick="angry()">No</button>
</div>

<div class="page" id="p6">
<h3 id="lightText"></h3>
<button id="lightBtn" onclick="startSlide()">Light On</button>
</div>

<div class="page" id="p7">
<img id="slide">
</div>

</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

show(1)

/* LETTER TYPING */

function typeLetter(el,text,speed=80,buttons=[]){

el.innerHTML=""

let i=0

const cursor=document.createElement("span")
cursor.className="cursor"
cursor.innerHTML="|"

el.appendChild(cursor)

function typing(){

if(i<text.length){

cursor.remove()

el.innerHTML+=text.charAt(i)

el.appendChild(cursor)

i++

setTimeout(typing,speed)

}else{

cursor.remove()

buttons.forEach(btn=>{
btn.classList.add("show")
})

}

}

typing()

}

/* TEXT */

typeLetter(
document.getElementById("creatorText"),
"Welcome To My Website Created By "+data.creator+" ❤️",
80,
[document.getElementById("btn1")]
)

typeLetter(
document.getElementById("playText"),
"Play Music?",
80,
[
document.getElementById("playBtn"),
document.getElementById("notBtn")
]
)

typeLetter(
document.getElementById("specialText"),
"It's Your Special Day"
)

typeLetter(
document.getElementById("specialSub"),
"Because You Are Special To Me ❤️",
80,
[document.getElementById("thankBtn")]
)

typeLetter(
document.getElementById("makeText"),
"I Had To Make Something Special"
)

typeLetter(
document.getElementById("makeSub"),
"Because You Are Special To Me ❤️",
80,
[
document.getElementById("excitedBtn"),
document.getElementById("noBtn")
]
)

typeLetter(
document.getElementById("seeText"),
"Do You Want To See What I Made?",
80,
[
document.getElementById("yesBtn"),
document.getElementById("noBtn2")
]
)

typeLetter(
document.getElementById("lightText"),
"Turn On The Light",
80,
[document.getElementById("lightBtn")]
)

/* PAGE */

function show(n){
document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById("p"+n).style.display="block"
}

/* NOTE */

function showNote(text,next){

const note=document.createElement("div")
note.className="noteBox"

const h=document.createElement("h3")

note.appendChild(h)

document.body.appendChild(note)

typeLetter(h,text,80)

setTimeout(()=>{
note.remove()
show(next)
},3000)

}

function playMusic(){

const player=document.getElementById("player")

player.src=data.music

player.play()

showNote("Thank You For Playing This Music ❤️",3)

}

function thankYou(){
showNote("You Make This Moment Special ❤️",4)
}

function excited(){
showNote("That Makes Me Really Happy ❤️",5)
}

function romantic(){
showNote("You Are The Most Special Person In My Life ❤️",6)
}

function angry(){
alert("Why Not? 😠")
}

/* PHOTO */

let index=0

function startSlide(){
show(7)
slide()
}

function slide(){

const img=document.getElementById("slide")

img.src=data.photos[index]

index++

if(index>=data.photos.length)return

setTimeout(slide,2000)

}

/* HEART */

function createHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(createHeart,800)

/* FLOWER */

function createFlower(){

const flower=document.createElement("div")
flower.className="flower"
flower.innerHTML="🌸"
flower.style.left=Math.random()*100+"vw"

document.body.appendChild(flower)

setTimeout(()=>{flower.remove()},7000)

}

setInterval(createFlower,1200)

</script>

</body>
</html>
