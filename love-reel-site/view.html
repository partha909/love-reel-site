<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Reel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:360px;
padding:25px;
border-radius:15px;
text-align:center;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

button{
padding:12px 25px;
margin-top:10px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<button id="playBtn">Play Music 🎵</button>

<div id="photos"></div>

</div>

<audio id="musicPlayer"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

const data=JSON.parse(localStorage.getItem(id))

document.getElementById("title").innerText=
"Website Created By "+data.creator+" ❤️"

document.getElementById("playBtn").onclick=()=>{

const player=document.getElementById("musicPlayer")

player.src=data.music

player.play()

}

const photoBox=document.getElementById("photos")

data.photos.forEach(url=>{

const img=document.createElement("img")

img.src=url

photoBox.appendChild(img)

})

</script>

</body>
</html>
