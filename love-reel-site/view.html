<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Story</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.box{
background:white;
width:420px;
max-width:95%;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
z-index:2;
}

.page{display:none;}

button{
padding:10px 18px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
margin-top:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

img{
width:100%;
border-radius:10px;
opacity:0;
}

/* NOTE SLIDE */

.noteBox{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:noteSlide .9s ease;
}

@keyframes noteSlide{

0%{
transform:translateY(-120px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}

}

/* MEMORIES TEXT */

.memories{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
color:white;
text-align:center;
font-weight:bold;
text-shadow:0 0 10px rgba(255,255,255,.7);
animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{opacity:.6}
100%{opacity:1}

}

/* HEARTS */

.heart{
position:fixed;
bottom:-20px;
color:#ff4d6d;
font-size:20px;
animation:heartFloat 6s linear infinite;
}

@keyframes heartFloat{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

/* FLOWER RAIN */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:flowerFall 7s linear infinite;
}

@keyframes flowerFall{

0%{transform:translateY(0) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}

}

</style>
</head>

<body>

<div class="box">

<div class="page" id="p1">
<h2 id="creatorText"></h2>
<button onclick="show(2)">Next</button>
</div>

<div class="page" id="p2">
<h3 id="playText"></h3>
<button onclick="playMusic()">Play</button>
<button onclick="angry()">Not Play</button>
</div>

<div class="page" id="p3">
<h3 id="specialText"></h3>
<p id="specialSub"></p>
<button onclick="thankYou()">Thank You ❤️</button>
</div>

<div class="page" id="p4">
<h3 id="makeText"></h3>
<p id="makeSub"></p>
<button onclick="excited()">I am excited 😊</button>
<button onclick="angry()">Not excited</button>
</div>

<div class="page" id="p5">
<h3 id="seeText"></h3>
<button onclick="romantic()">Yes</button>
<button onclick="angry()">No</button>
</div>

<div class="page" id="p6">
<h3 id="lightText"></h3>
<button onclick="startSlide()">Light On</button>
</div>

<div class="page" id="p7">

<div class="memories">
<h3>Our Memories ❤️</h3>
<p>Every moment with you is special</p>
</div>

<img id="slide">

</div>

</div>

<audio id="player"></audio>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")
const data=JSON.parse(localStorage.getItem(id))

show(1)

/* WORD BY WORD REVEAL */

function typeText(el,text,speed=130){

el.innerHTML=""
const words=text.split(" ")

let i=0

function reveal(){

if(i<words.length){

el.innerHTML+=words[i]+" "
i++

setTimeout(reveal,speed)

}

}

reveal()

}

/* PAGE TEXT */

typeText(document.getElementById("creatorText"),"Website Created By "+data.creator+" ❤️")
typeText(document.getElementById("playText"),"Play Music?")
typeText(document.getElementById("specialText"),"It's Your Special Day")
typeText(document.getElementById("specialSub"),"Because you are special to me ❤️")
typeText(document.getElementById("makeText"),"I had to make something special")
typeText(document.getElementById("makeSub"),"Because you are special to me ❤️")
typeText(document.getElementById("seeText"),"Do you want to see what I made?")
typeText(document.getElementById("lightText"),"Turn On Light 💡")

function show(n){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById("p"+n).style.display="block"

}

/* NOTE */

function note(text,nextPage){

showNote(text)

setTimeout(()=>{
show(nextPage)
},3000)

}

function showNote(text){

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

const div=document.createElement("div")
div.className="noteBox"

const noteText=document.createElement("h3")

div.appendChild(noteText)
document.body.appendChild(div)

typeText(noteText,text,140)

setTimeout(()=>{
div.remove()
},3000)

}

function playMusic(){

const player=document.getElementById("player")
player.src=data.music
player.play()

note("Thank you for playing the music ❤️",3)

}

function thankYou(){

note("You make this moment special ❤️",4)

}

function excited(){

note("That makes me really happy ❤️",5)

}

function romantic(){

note("You are the most special person in my life ❤️",6)

}

function angry(){

alert("Why not? 😠")

}

/* PHOTO SLIDE */

let index=0

function startSlide(){

show(7)
slide()

}

function slide(){

const img=document.getElementById("slide")

img.src=data.photos[index]

img.style.opacity=0

setTimeout(()=>{
img.style.opacity=1
},100)

index++

if(index>=data.photos.length)return

setTimeout(slide,2000)

}

/* HEARTS */

function createHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,800)

/* FLOWERS */

function createFlower(){

const flower=document.createElement("div")
flower.className="flower"
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"

document.body.appendChild(flower)

setTimeout(()=>{
flower.remove()
},7000)

}

setInterval(createFlower,1200)

</script>

</body>
</html>
